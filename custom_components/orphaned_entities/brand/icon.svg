<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#db4437"/>
  <!-- Broom handle -->
  <rect x="148" y="48" width="14" height="110" rx="7" fill="white" transform="rotate(18 148 48)"/>
  <!-- Broom head -->
  <ellipse cx="96" cy="172" rx="52" ry="20" fill="white" opacity="0.95"/>
  <!-- Broom bristles -->
  <line x1="56"  y1="172" x2="44"  y2="200" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="72"  y1="178" x2="64"  y2="208" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="90"  y1="182" x2="86"  y2="212" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="108" y1="182" x2="108" y2="212" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="126" y1="178" x2="130" y2="208" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="142" y1="172" x2="150" y2="200" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Small orphan dots being swept -->
  <circle cx="60"  cy="148" r="8" fill="white" opacity="0.6"/>
  <circle cx="82"  cy="138" r="6" fill="white" opacity="0.5"/>
  <circle cx="104" cy="144" r="7" fill="white" opacity="0.55"/>
