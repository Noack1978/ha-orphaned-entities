  <ellipse cx="44" cy="82" rx="26" ry="10" fill="white" opacity="0.95"/>
  <!-- Bristles -->
  <line x1="24" y1="82" x2="19" y2="96" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="33" y1="86" x2="30" y2="100" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="44" y1="88" x2="43" y2="102" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="55" y1="86" x2="56" y2="100" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="82" x2="69" y2="96" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
